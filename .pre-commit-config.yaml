repos:
  # 1. Gitleaks — fast regex-based secret scanner (runs in ms)
  # Note: upstream hook ships its own gitleaks binary; entry can't be wrapped
  # with `timeout`. CI workflow `pii-guard.yml` runs gitleaks-action as the
  # authoritative gate.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  # 2. ggshield — GitGuardian scanner (installed via pipx to avoid dep conflicts)
  # Install: pipx install ggshield && ggshield auth login
  # Wrapped in `timeout 30` so a hung scan exits fast instead of tempting --no-verify
  - repo: local
    hooks:
      - id: ggshield
        name: ggshield
        language: system
        entry: timeout 30 ggshield secret scan pre-commit
        pass_filenames: false

  # 3. Custom PII guard — blocks CPA-IDs, Hebrew text, and tokens in .agent/
  # AND in high-risk docs/ filenames (audit, compliance, security, secret notes
  # — the genre that produced the 2026-05-02 multi-tenant-audit.md leak).
  # Layer 3 of the Phase-2 prevention work; Layer 8 broadens the filename match
  # to ANY path with these keywords, not just docs/.
  - repo: local
    hooks:
      - id: agent-pii-guard
        name: agent-pii-guard
        entry: python3 .claude/hooks/agent-pii-guard.py
        language: python
        pass_filenames: true
        files: '^(\.agent/|docs/.*(audit|compliance|security|secret).*\.md$|docs/SECURITY\.md$)'
        types: [text]

  # 4. Size-ratchet — block growth of monolithic JS files (script.js, chatbot.js)
  # Baseline lives in .claude/script-size-baseline.json. Shrinks auto-update.
  - repo: local
    hooks:
      - id: script-size-ratchet
        name: script-size-ratchet
        entry: python3 .claude/hooks/script-size-ratchet.py
        language: system
        pass_filenames: false
        always_run: true
