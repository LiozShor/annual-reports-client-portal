name: Check (typecheck + dry-run deploy)

on:
  push:
    branches:
      - 'DL-*'
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - name: Install api/ deps
        working-directory: api
        run: npm ci
      - name: Typecheck api/
        working-directory: api
        run: ./node_modules/.bin/tsc --noEmit

  dry-run-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - name: Install api/ deps
        working-directory: api
        run: npm ci
      - name: Wrangler dry-run
        working-directory: api
        run: npx wrangler deploy --dry-run --outdir=/tmp/dist

  size-ratchet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need HEAD~1 for baseline-bump comparison
      - name: Run size-ratchet
        run: python3 .claude/hooks/script-size-ratchet.py
