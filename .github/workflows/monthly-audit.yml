name: Monthly agentic audit

on:
  schedule:
    # 06:00 UTC on the 1st of each month = 09:00 Israel local (winter) / 08:00 (summer)
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  open-audit-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Open audit tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date();
            const yyyy = now.getUTCFullYear();
            const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
            const tag = `${yyyy}-${mm}`;
            const title = `Monthly agentic audit — ${tag}`;

            // Find prior audit file in .agent/insights-audits/ to link to
            const fs = require('fs');
            const path = require('path');
            const dir = '.agent/insights-audits';
            let prior = 'none';
            try {
              const files = fs.readdirSync(dir)
                .filter(f => f.endsWith('.md'))
                .sort()
                .reverse();
              if (files.length) prior = `[\`${files[0]}\`](${dir}/${files[0]})`;
            } catch (_) {}

            const body = [
              `Auto-opened by \`.github/workflows/monthly-audit.yml\` on the 1st of ${tag}.`,
              ``,
              `**Prior audit:** ${prior}`,
              ``,
              `## Run the audit`,
              ``,
              `Open Claude Code in the repo and invoke the \`/monthly-insights\` skill (\`.agent/skills/monthly-insights/SKILL.md\`).`,
              ``,
              `## Tracking signals (from baseline 2026-04-27)`,
              ``,
              `1. Did Proposal 1 (CI gate) ship? broken-build commit count delta.`,
              `2. Did Proposal 2 (monthly audit) ship and fire at least once? file in \`.agent/insights-audits/${tag}.md\`?`,
              `3. Did Proposal 3 (perms + sniff) ship? false-positive count, blocked-tool count.`,
              `4. Memory churn: new files in the project memory dir; any decayed/removed?`,
              `5. New design logs in window with category "revert" or "fix-of-fix" — friction signal.`,
              `6. Anti-pattern #4 (auto-\`npm install\`) addressed by switching to \`npm ci\`?`,
              ``,
              `## Checklist`,
              ``,
              `- [ ] Audit run`,
              `- [ ] File committed at \`.agent/insights-audits/${tag}.md\``,
              `- [ ] Prior month's proposals reviewed (shipped / abandoned / in-progress)`,
              `- [ ] Memory decay pass: stale entries flagged or removed`,
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['agentic-audit'],
            });
            core.setOutput('issue_url', issue.html_url);
            core.notice(`Opened ${issue.html_url}`);
