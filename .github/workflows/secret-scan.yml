name: Secret Scan (TruffleHog)
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for TruffleHog diff scan

      - name: TruffleHog — scan for secrets with live verification
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # scan only commits added in this push/PR, not the full history
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.sha }}
          extra_args: --only-verified
