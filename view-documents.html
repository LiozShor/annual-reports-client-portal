<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https://flagcdn.com data:; connect-src 'self' https://liozshor.app.n8n.cloud https://unpkg.com; frame-src https://tally.so; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'self';">
    <title>רשימת מסמכים נדרשים להכנת הדו״ח - Required Documents for Annual Report</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/common.css">
    <link rel="stylesheet" href="assets/css/view-documents.css">
    <script src="https://unpkg.com/lucide@0.576.0/dist/umd/lucide.min.js" integrity="sha384-b05ba3pt6xaC7F4r130arhf8cF18GH/gKu9JDz/NMf+BhLlBVwIWUdAZSpf1IWRZ" crossorigin="anonymous" defer></script>
</head>
<body>
    <noscript>
        <div class="noscript-fallback">
            <h2>JavaScript Required / נדרש JavaScript</h2>
            <p>דף זה דורש JavaScript כדי לפעול. אנא הפעילו JavaScript בדפדפן או פנו למשרד:</p>
            <p>This page requires JavaScript. Please enable JavaScript or contact the office:</p>
            <p><a href="mailto:reports@moshe-atsits.co.il">reports@moshe-atsits.co.il</a></p>
        </div>
    </noscript>
    <div class="page-wrapper">
        <div class="container">
            <header class="page-header">
                <div class="header-top">
                    <div class="header-brand">
                        <a href="./">
                            <img src="assets/images/logo.png" alt="משרד רו״ח משה עציץ" class="site-logo site-logo-md" width="1010" height="306">
                        </a>
                        <div>
                            <h1 id="title-he">רשימת מסמכים נדרשים להכנת הדו״ח</h1>
                            <h1 id="title-en" class="hidden">Required Documents for Annual Report</h1>
                        </div>
                    </div>
                    <div class="lang-toggle" id="lang-toggle" style="display:none;">
                        <button class="lang-pill active" id="btn-he" onclick="switchLanguage('he')">עברית</button>
                        <button class="lang-pill" id="btn-en" onclick="switchLanguage('en')">English</button>
                    </div>
                </div>
                <div class="header-subtitle" id="subtitle"></div>
                <div class="progress-section" id="progress-section" style="display:none;">
                    <div class="progress-info">
                        <span id="progress-text-he"></span>
                        <span id="progress-text-en" class="hidden"></span>
                        <span class="progress-percent" id="progress-percent"></span>
                    </div>
                    <div class="progress-bar progress-bar-lg">
                        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
                    </div>
                </div>
            </header>

            <div class="content">
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p id="loading-text-he">טוען את רשימת המסמכים...</p>
                    <p id="loading-text-en" class="hidden">Loading document list...</p>
                </div>

                <div id="error" class="error-state" style="display: none;" role="alert" aria-live="assertive"></div>

                <div id="results" style="display: none;">
                    <div id="documents-container"></div>

                    <div class="contact-card">
                        <div class="contact-icon">
                            <i data-lucide="mail" class="icon"></i>
                        </div>
                        <div class="contact-body">
                            <h3 id="contact-title-he">איך שולחים את המסמכים?</h3>
                            <h3 id="contact-title-en" class="hidden">How to Submit Documents?</h3>
                            <p id="contact-text-he">
                                שלחו את המסמכים במייל בקובץ מצורף:<br>
                                <strong id="email-display"></strong>
                            </p>
                            <p id="contact-text-en" class="hidden">
                                Send the documents via email as attachments:<br>
                                <strong id="email-display-en"></strong>
                            </p>
                        </div>
                        <a href="#" id="email-button" class="btn btn-primary">
                            <i data-lucide="send" class="icon-sm"></i>
                            <span id="email-btn-text">שליחת מייל</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/error-handler.js"></script>
    <script src="assets/js/resilient-fetch.js"></script>
    <script src="shared/constants.js"></script>
    <script src="shared/endpoints.js"></script>
    <script src="shared/utils.js"></script>
    <script src="assets/js/view-documents.js"></script>
</body>
</html>
