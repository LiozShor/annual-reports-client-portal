name = "annual-reports-api"
main = "src/index.ts"
compatibility_date = "2025-03-15"
compatibility_flags = ["nodejs_compat"]  # Required by archive-wasm (DL-260)
# Deployed at: https://annual-reports-api.liozshor1.workers.dev

[limits]
subrequests = 10000   # 12-attachment emails need ~300 (fetch + KV ops + redirects)
cpu_ms = 300000       # 5 min CPU — needed for multi-attachment AI classification

[vars]
ALLOWED_ORIGIN = "https://docs.moshe-atsits.com,http://docs.moshe-atsits.com"
AIRTABLE_BASE_ID = "appqBL5RWQN9cPOyh"
ALERT_EMAIL = "liozshor1@gmail.com"

# Secrets (set via `wrangler secret put`):
# - ADMIN_PASSWORD
# - SECRET_KEY
# - CLIENT_SECRET_KEY
# - AIRTABLE_PAT
# - MS_GRAPH_CLIENT_ID
# - MS_GRAPH_CLIENT_SECRET
# - MS_GRAPH_TENANT_ID
# - MS_GRAPH_REFRESH_TOKEN
# - N8N_INTERNAL_KEY          # Phase 5: Worker→n8n internal webhook auth
# - ANTHROPIC_API_KEY        # Phase 9: Chat agent AI proxy

[[kv_namespaces]]
binding = "TOKEN_CACHE"
id = "5e3beec684c04f539939efe42dada1d0"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "39bcc73f6c8c4507bc9c5032bf2914cf"

# DL-287: Cloudflare Queues (inbound email pipeline)
[[queues.producers]]
binding = "INBOUND_QUEUE"
queue = "inbound-email"

[[queues.consumers]]
queue = "inbound-email"
# Each message can consume the full cpu_ms=300000 (5 min) budget when an email has
# many attachments and Anthropic 429-retries. batch_size=1 keeps each invocation
# scoped to one email so retries don't blow the whole batch.
max_batch_size = 1
max_batch_timeout = 2
max_retries = 3
max_concurrency = 2
retry_delay = 30
dead_letter_queue = "inbound-email-dlq"

[[queues.consumers]]
queue = "inbound-email-dlq"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 1

# DL-365: R2 archive for activity logs (Logpush destination, also read by dev viewer)
[[r2_buckets]]
binding = "ACTIVITY_LOGS"
bucket_name = "activity-logs-archive"

[observability]
enabled = true
head_sampling_rate = 1   # 100% sampling — ~1000 req/day is well within 20M/month free tier
# DL-365: enable logpush via Cloudflare dashboard
# (Workers > activity-logs-archive Worker > Logs > Add Logpush Job)
# dataset = workers_trace_events, destination = R2 bucket activity-logs-archive
